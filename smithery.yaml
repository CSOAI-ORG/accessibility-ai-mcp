name: accessibility-ai-mcp
description: Color contrast checking, alt text suggestions, heading hierarchy, and
  ARIA validation.
version: 1.0.0
tools:
- name: check_color_contrast
  description: Check WCAG 2.1 color contrast ratio between foreground and background
    colors.
  parameters:
  - name: foreground
    type: string
    required: true
  - name: background
    type: string
    required: true
  - name: font_size
    type: number
    required: false
  - name: bold
    type: boolean
    required: false
- name: suggest_alt_text
  description: Suggest alt text guidelines and templates for different image types.
  parameters:
  - name: context
    type: string
    required: true
  - name: image_type
    type: string
    required: false
- name: check_heading_hierarchy
  description: Check heading hierarchy in HTML for proper nesting (h1 -> h2 -> h3...).
  parameters:
  - name: html
    type: string
    required: true
- name: aria_validator
  description: Validate ARIA attributes and roles in HTML for correctness.
  parameters:
  - name: html
    type: string
    required: true
